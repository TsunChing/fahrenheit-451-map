<!DOCTYPE html>
<html>
<head>
    <title>Fahrenheit 451 Map</title>
    <style>
        #map {
            height: 500px;
            width: 100%;
        }
    </style>
</head>

<body>
    <h1>Fahrenheit 451 Interactive Map</h1>

    <div id="map"></div>

    <script>
        function initMap() {
            const center = { lat: 37.7749, lng: -122.4194 }; // example location

            const map = new google.maps.Map(document.getElementById("map"), {
                zoom: 12,
                center: center,
            });

            const marker = new google.maps.Marker({
                position: center,
                map: map,
                title: "Montag's House"
            });
        }
    </script>
