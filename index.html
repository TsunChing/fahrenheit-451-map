<!DOCTYPE html>
<html>
<head>
    <title>Fahrenheit 451 Map</title>
    <style>
        #map {
            height: 500px;
            width: 100%;
        }
    </style>
    <style>
    body {
        font-family: Arial;
        text-align: center;
    }
    
    h1 {
        color: darkred;
    }
    </style>
</head>

<body>
    <h1>Fahrenheit 451 Interactive Map</h1>

    <div id="map"></div>

<script>
function initMap() {
    const map = new google.maps.Map(document.getElementById("map"), {
        zoom: 12,
        center: { lat: 37.7749, lng: -122.4194 },
    });

    const locations = [
        {
            position: { lat: 37.7749, lng: -122.4194 },
            title: "Montag's House",
            info: "<h3>Montag's House</h3><p>Where Montag begins his journey as a fireman.</p>"
        },
        {
            position: { lat: 37.7799, lng: -122.4294 },
            title: "Clarisse's Area",
            info: "<h3>Clarisse</h3><p>She introduces Montag to new ways of thinking.</p>"
        },
        {
            position: { lat: 37.7849, lng: -122.4094 },
            title: "Fire Station",
            info: "<h3>Fire Station</h3><p>Where books are burned.</p>"
        }
    ];

    locations.forEach(location => {
        const marker = new google.maps.Marker({
            position: location.position,
            map: map,
            title: location.title
        });

        const infoWindow = new google.maps.InfoWindow({
            content: location.info
        });

        marker.addListener("click", () => {
            infoWindow.open(map, marker);
        });
    });
}
</script>

    <!-- REPLACE YOUR_API_KEY -->
    <script async
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCBZiDFbgT2_HGK7BA-qzmfDaYL9hmXILA&callback=initMap">
    </script>

</body>
</html>
