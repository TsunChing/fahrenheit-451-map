<!DOCTYPE html>
<html>
<head>
    <title>Fahrenheit 451 Interactive Map</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Fahrenheit 451 Interactive Map 🔥</h1>

<div id="timeline">
    <button onclick="goToLocation(0)">Montag</button>
    <button onclick="goToLocation(1)">Clarisse</button>
    <button onclick="goToLocation(2)">Fire Station</button>
    <button onclick="goToLocation(3)">Old Woman</button>
    <button onclick="goToLocation(4)">River</button>
    <button onclick="goToLocation(5)">Forest</button>
</div>

<div id="map"></div>

<h2>Themes</h2>
<ul>
    <li>Censorship</li>
    <li>Technology vs Humanity</li>
    <li>Knowledge vs Ignorance</li>
</ul>

<!-- JS file -->
<script src="script.js"></script>

<!-- Google Maps API -->
<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCBZiDFbgT2_HGK7BA-qzmfDaYL9hmXILA&callback=initMap">
</script>

</body>
</html>
